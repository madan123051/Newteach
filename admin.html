<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>New Tech Admin | Modern Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Firebase SDKs (compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1e3a8a',
            secondary: '#f97316',
            accent: '#3b82f6',
            surface: '#f8fafc',
          },
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <style>
    :root {
      --primary: #1e3a8a;
      --secondary: #f97316;
    }
    .glass {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    .nav-item.active {
      background: var(--primary);
      color: white;
      box-shadow: 0 10px 15px -3px rgba(30, 58, 138, 0.3);
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #e2e8f0;
      border-radius: 10px;
    }
    .login-gradient {
      background: radial-gradient(circle at top right, #1e3a8a, #1e293b);
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--secondary) !important;
      ring: 2px;
      ring-color: rgba(249, 115, 22, 0.2);
    }
    @media (max-width: 768px) {
      .sidebar-mobile {
        transform: translateX(-100%);
        transition: transform 0.3s ease-in-out;
      }
      .sidebar-mobile.open {
        transform: translateX(0);
      }
    }
  </style>
</head>
<body class="bg-surface text-slate-900 custom-scrollbar">

  <!-- Login Screen -->
  <div id="loginSection" class="fixed inset-0 z-[2000] flex items-center justify-center p-4 login-gradient">
    <div class="w-full max-w-md bg-white rounded-[2rem] p-8 md:p-10 shadow-2xl text-center transform transition-all">
      <div class="inline-flex items-center justify-center w-20 h-20 bg-slate-50 rounded-2xl mb-6 shadow-inner">
        <img src="assets/logo.png" alt="Logo" class="h-12 w-auto">
      </div>
      <h2 class="text-3xl font-extrabold text-primary mb-2">Sofia Admin</h2>
      <p class="text-slate-500 mb-8 font-medium">Secure access to your business portal</p>
      
      <form id="loginForm" class="space-y-5">
        <div class="text-left">
          <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2 ml-1">Email Address</label>
          <input type="email" id="loginEmail" required class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:bg-white transition-all" placeholder="admin@newtech.com" value="homesolutionsnewtech@gmail.com">
        </div>
        <div class="text-left">
          <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2 ml-1">Password</label>
          <input type="password" id="loginPass" required class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:bg-white transition-all" placeholder="••••••••">
        </div>
        <button type="submit" id="loginBtn" class="w-full py-4 bg-secondary hover:bg-orange-600 text-white rounded-2xl font-bold text-lg shadow-lg shadow-orange-200 transition-all transform hover:-translate-y-1 active:scale-95">
          Sign In
        </button>
      </form>
      <p class="mt-8 text-slate-400 text-sm">© 2026 New Tech Home Solutions</p>
    </div>
  </div>

  <!-- Main App Shell -->
  <div id="appSection" class="hidden flex min-h-screen">
    
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar-mobile fixed md:sticky top-0 left-0 h-screen w-72 bg-white border-r border-slate-100 p-6 flex flex-col z-[1000] md:translate-x-0">
      <div class="flex items-center gap-3 mb-10 px-2">
        <img src="assets/logo.png" alt="Logo" class="h-10 w-auto">
        <span class="font-extrabold text-xl text-primary tracking-tight">New Tech</span>
      </div>

      <nav class="space-y-2 flex-1 overflow-y-auto custom-scrollbar" id="navItems">
        <!-- Dynamic Nav Items -->
      </nav>

      <div class="pt-6 border-t border-slate-100 space-y-2">
        <a href="index.html" class="flex items-center gap-4 px-5 py-3 rounded-xl font-bold text-slate-400 hover:text-accent transition-all">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>
          Live Site
        </a>
        <button onclick="logout()" class="w-full flex items-center gap-4 px-5 py-3 rounded-xl font-bold text-red-400 hover:bg-red-50 transition-all">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
          Sign Out
        </button>
      </div>
    </aside>

    <!-- Content Area -->
    <main class="flex-1 flex flex-col min-w-0">
      <!-- Top Header -->
      <header class="flex items-center justify-between p-4 md:p-6 bg-white border-b border-slate-100 sticky top-0 z-[900]">
        <div class="flex items-center gap-4">
          <button onclick="toggleMenu()" class="md:hidden p-2 bg-slate-50 rounded-xl text-primary">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
          </button>
          <div class="hidden md:block">
            <h1 id="pageTitle" class="text-2xl font-extrabold text-primary">Overview</h1>
          </div>
        </div>
        
        <div class="flex items-center gap-4">
          <div class="hidden sm:flex items-center gap-3 px-4 py-2 bg-slate-50 rounded-2xl border border-slate-100">
            <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
            <span class="text-xs font-bold text-slate-500 uppercase tracking-wider">Firebase Live</span>
          </div>
          <div class="w-10 h-10 rounded-2xl bg-primary flex items-center justify-center text-white font-bold shadow-lg shadow-blue-100">
            SA
          </div>
        </div>
      </header>

      <!-- View Content -->
      <div id="viewContainer" class="p-4 md:p-8 lg:p-10 max-w-7xl mx-auto w-full"></div>
    </main>
  </div>

  <!-- Global Modal -->
  <div id="modal" class="hidden fixed inset-0 z-[3000] flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm">
    <div class="bg-white w-full max-w-2xl rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
      <div class="p-8 border-b border-slate-50 flex items-center justify-between">
        <h2 id="modalTitle" class="text-2xl font-extrabold text-primary">Edit Record</h2>
        <button onclick="closeModal()" class="p-2 hover:bg-slate-100 rounded-full transition-all">
          <svg class="w-6 h-6 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
      </div>
      <div class="p-8 overflow-y-auto custom-scrollbar flex-1">
        <form id="recordForm" class="space-y-6"></form>
      </div>
      <div class="p-8 bg-slate-50/50 flex gap-4">
        <button type="submit" form="recordForm" id="saveBtn" class="flex-1 py-4 bg-secondary text-white rounded-2xl font-bold shadow-lg shadow-orange-100 transition-all hover:-translate-y-0.5 active:scale-95">
          Save Changes
        </button>
        <button onclick="closeModal()" class="px-8 py-4 bg-white border border-slate-200 text-slate-500 rounded-2xl font-bold hover:bg-slate-50 transition-all">
          Cancel
        </button>
      </div>
    </div>
  </div>

  <script>
    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyATvwM_0B9ibtD9MniIoiNuiirnC0mb2AY",
      authDomain: "newtechhomesolutions-b6ab6.firebaseapp.com",
      projectId: "newtechhomesolutions-b6ab6",
      storageBucket: "newtechhomesolutions-b6ab6.firebasestorage.app",
      messagingSenderId: "1015056454392",
      appId: "1:1015056454352:web:2d764c7f4e0f769407e10d",
      measurementId: "G-8HV2QWDK4W"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const storage = firebase.storage();

    let currentView = 'overview';
    let data = {};

    const schemas = {
      overview: { label: 'Overview', icon: '📊' },
      leads: { label: 'Inquiries', singular: 'Inquiry', icon: '📥', fields: [['name','Full Name','text'],['phone','Phone Number','tel'],['email','Email','email'],['service','Service Interest','text'],['status','Lead Status','select',['new','contacted','closed','junk']],['message','Customer Message','textarea']] },
      applicants: { label: 'Job Applicants', singular: 'Applicant', icon: '👨‍💼', fields: [['name','Applicant Name','text'],['phone','Contact Number','tel'],['jobTitle','Applied For','text'],['status','Review Status','select',['new','reviewed','hired','rejected']],['resume','Internal Notes','textarea']] },
      jobs: { label: 'Job Vacancies', singular: 'Vacancy', icon: '💼', fields: [['title','Job Title','text'],['department','Department','text'],['status','Vacancy Status','select',['active','expired']],['expiryDate','Expiry Date','date'],['description','Job Description','textarea']] },
      media: { label: 'Media Gallery', singular: 'Media Asset', icon: '🖼', fields: [['title','Asset Title','text'],['type','Asset Type','select',['photo','video']],['category','Category','select',['Pleated Mesh','Honey Comb Partition','Invisible Grill','Anti Bird Net','Other']],['file','Upload File','file'],['url','Direct URL (Optional)','url']] },
      blogs: { label: 'Blogs', singular: 'Blog Post', icon: '✍️', fields: [['title','Title','text'],['author','Author','text'],['status','Status','select',['draft','published']],['content','Content','textarea']] }
    };

    // Auth Logic
    auth.onAuthStateChanged((user) => {
      if (user) {
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('appSection').classList.remove('hidden');
        renderSidebar();
        initSync();
      } else {
        document.getElementById('loginSection').classList.remove('hidden');
        document.getElementById('appSection').classList.add('hidden');
      }
    });

    document.getElementById('loginForm').onsubmit = async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true; btn.innerHTML = '<span class="animate-spin inline-block w-5 h-5 border-2 border-white/30 border-t-white rounded-full mr-2"></span> Authenticating...';
      try {
        await auth.signInWithEmailAndPassword(document.getElementById('loginEmail').value, document.getElementById('loginPass').value);
      } catch (err) {
        alert('Login Failed: ' + err.message);
      } finally {
        btn.disabled = false; btn.textContent = 'Sign In';
      }
    };

    window.logout = () => auth.signOut();
    window.toggleMenu = () => document.getElementById('sidebar').classList.toggle('open');

    function renderSidebar() {
      const nav = document.getElementById('navItems');
      nav.innerHTML = Object.keys(schemas).map(key => `
        <button onclick="showView('${key}', this)" class="nav-item w-full flex items-center gap-4 px-5 py-4 rounded-2xl font-bold text-slate-500 hover:bg-slate-50 transition-all relative ${currentView === key ? 'active' : ''}">
          <span class="text-xl">${schemas[key].icon}</span>
          ${schemas[key].label}
          ${key === 'leads' ? `<span id="leadsBadge" class="hidden absolute right-4 top-1/2 -translate-y-1/2 bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full">0</span>` : ''}
          ${key === 'applicants' ? `<span id="appsBadge" class="hidden absolute right-4 top-1/2 -translate-y-1/2 bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full">0</span>` : ''}
        </button>
      `).join('');
    }

    function initSync() {
      Object.keys(schemas).forEach(key => {
        if (key === 'overview') return;
        db.collection(key).orderBy("createdAt", "desc").onSnapshot((snapshot) => {
          data[key] = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          updateBadges();
          if (currentView === key || currentView === 'overview') renderView();
        });
      });
    }

    function updateBadges() {
      const leadsCount = (data.leads || []).filter(l => l.status === 'new').length;
      const appsCount = (data.applicants || []).filter(a => a.status === 'new').length;
      const lB = document.getElementById('leadsBadge');
      const aB = document.getElementById('appsBadge');
      if (lB) { if (leadsCount > 0) { lB.textContent = leadsCount; lB.classList.remove('hidden'); } else { lB.classList.add('hidden'); } }
      if (aB) { if (appsCount > 0) { aB.textContent = appsCount; aB.classList.remove('hidden'); } else { aB.classList.add('hidden'); } }
    }

    window.showView = (view, btn) => {
      currentView = view;
      document.getElementById('pageTitle').textContent = schemas[view].label;
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (window.innerWidth < 768) toggleMenu();
      renderView();
    };

    function renderView() {
      const container = document.getElementById('viewContainer');
      if (currentView === 'overview') {
        container.innerHTML = `
          <div class="mb-10">
            <h1 class="text-4xl font-extrabold text-primary mb-2">Hello, Sofia!</h1>
            <p class="text-slate-500 font-medium">Your business dashboard is synced and ready.</p>
          </div>
          
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
            <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-50 relative overflow-hidden group hover:shadow-xl transition-all">
              <span class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-4 relative">Total Inquiries</span>
              <h2 class="text-4xl font-extrabold text-primary relative">${(data.leads||[]).length}</h2>
            </div>
            <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-50 relative overflow-hidden group hover:shadow-xl transition-all">
              <span class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-4 relative">Applicants</span>
              <h2 class="text-4xl font-extrabold text-secondary relative">${(data.applicants||[]).length}</h2>
            </div>
            <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-50 relative overflow-hidden group hover:shadow-xl transition-all">
              <span class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-4 relative">Live Jobs</span>
              <h2 class="text-4xl font-extrabold text-indigo-600 relative">${(data.jobs||[]).filter(j=>j.status==='active').length}</h2>
            </div>
            <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-50 relative overflow-hidden group hover:shadow-xl transition-all">
              <span class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-4 relative">Media</span>
              <h2 class="text-4xl font-extrabold text-slate-700 relative">${(data.media||[]).length}</h2>
            </div>
          </div>
        `;
      } else {
        const schema = schemas[currentView];
        container.innerHTML = `
          <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-6 mb-10">
            <div>
              <h1 class="text-4xl font-extrabold text-primary mb-2">${schema.label}</h1>
              <p class="text-slate-500 font-medium">Manage your ${schema.label.toLowerCase()} efficiently.</p>
            </div>
            <button onclick="openModal()" class="px-8 py-4 bg-secondary text-white rounded-2xl font-bold shadow-lg shadow-orange-100 flex items-center justify-center gap-2 hover:-translate-y-1 transition-all">
              <span>+</span> Add New ${schema.singular}
            </button>
          </div>

          <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-50 overflow-hidden">
            <div class="overflow-x-auto custom-scrollbar">
              <table class="w-full text-left">
                <thead>
                  <tr class="bg-slate-50/50">
                    <th class="px-8 py-6 text-[11px] font-extrabold uppercase tracking-widest text-slate-400">Content</th>
                    <th class="px-8 py-6 text-[11px] font-extrabold uppercase tracking-widest text-slate-400">Status</th>
                    <th class="px-8 py-6 text-[11px] font-extrabold uppercase tracking-widest text-slate-400 text-right">Actions</th>
                  </tr>
                </thead>
                <tbody class="divide-y divide-slate-50">
                  ${(data[currentView] || []).map(item => `
                    <tr class="hover:bg-slate-50/50 transition-all group">
                      <td class="px-8 py-6">
                        <div class="flex items-center gap-4">
                          <div class="w-10 h-10 rounded-xl bg-slate-100 flex items-center justify-center text-primary font-bold">
                            ${(item.name || item.title || 'X')[0].toUpperCase()}
                          </div>
                          <div>
                            <p class="font-bold text-slate-800">${item.name || item.title}</p>
                            <p class="text-xs text-slate-400 font-medium">${item.phone || item.department || item.category || ''}</p>
                          </div>
                        </div>
                      </td>
                      <td class="px-8 py-6">
                        <span class="text-[10px] font-bold uppercase tracking-wider px-3 py-1 rounded-full ${item.status === 'new' || item.status === 'active' ? 'bg-blue-100 text-blue-600' : 'bg-slate-100 text-slate-500'}">
                          ${item.status || 'Standard'}
                        </span>
                      </td>
                      <td class="px-8 py-6 text-right">
                        <div class="flex items-center justify-end gap-2">
                          <button onclick="openModal('${item.id}')" class="p-2 hover:bg-white hover:shadow-md rounded-lg text-slate-400 hover:text-accent transition-all">Edit</button>
                          <button onclick="deleteRecord('${item.id}')" class="p-2 hover:bg-white hover:shadow-md rounded-lg text-slate-400 hover:text-red-500 transition-all">Delete</button>
                        </div>
                      </td>
                    </tr>
                  `).join('') || '<tr><td colspan="3" class="px-8 py-20 text-center text-slate-400 font-medium">No records found.</td></tr>'}
                </tbody>
              </table>
            </div>
          </div>
        `;
      }
    }

    window.openModal = (id = null) => {
      const schema = schemas[currentView];
      const item = id ? data[currentView].find(i => i.id === id) : null;
      document.getElementById('modalTitle').textContent = id ? `Edit ${schema.singular}` : `Add New ${schema.singular}`;
      const form = document.getElementById('recordForm');
      form.innerHTML = `<input type="hidden" name="id" value="${id || ''}">`;
      
      schema.fields.forEach(([key, label, type, options]) => {
        let input = '';
        const val = item ? item[key] || '' : '';
        if (type === 'select') {
          input = `<select name="${key}" class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:bg-white transition-all">
            ${options.map(o => `<option value="${o}" ${val === o ? 'selected' : ''}>${o}</option>`).join('')}
          </select>`;
        } else if (type === 'textarea') {
          input = `<textarea name="${key}" rows="4" class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:bg-white transition-all">${val}</textarea>`;
        } else if (type === 'file') {
          input = `<input type="file" name="${key}" class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl">`;
        } else {
          input = `<input type="${type}" name="${key}" value="${val}" class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:bg-white transition-all">`;
        }
        form.innerHTML += `<div class="space-y-2"><label class="block text-xs font-extrabold uppercase tracking-widest text-slate-400 ml-1">${label}</label>${input}</div>`;
      });
      document.getElementById('modal').classList.remove('hidden');
    };

    window.closeModal = () => document.getElementById('modal').classList.add('hidden');

    document.getElementById('recordForm').onsubmit = async (e) => {
      e.preventDefault();
      const btn = document.getElementById('saveBtn');
      btn.disabled = true; btn.textContent = 'Saving...';
      const fd = new FormData(e.target);
      const id = fd.get('id');
      const payload = { updatedAt: new Date().toISOString() };
      
      for (let [key, value] of fd.entries()) {
        if (key === 'id') continue;
        if (value instanceof File && value.size > 0) {
          const sRef = storage.ref(`uploads/${Date.now()}_${value.name}`);
          await sRef.put(value);
          payload.url = await sRef.getDownloadURL();
        } else if (!(value instanceof File)) {
          payload[key] = value;
        }
      }

      try {
        if (id) {
          await db.collection(currentView).doc(id).update(payload);
        } else {
          payload.createdAt = new Date().toISOString();
          await db.collection(currentView).add(payload);
        }
        closeModal();
      } catch (err) {
        alert('Error: ' + err.message);
      } finally {
        btn.disabled = false; btn.textContent = 'Save Changes';
      }
    };

    window.deleteRecord = async (id) => {
      if (confirm('Delete permanently?')) await db.collection(currentView).doc(id).delete();
    };
  </script>
</body>
</html>
